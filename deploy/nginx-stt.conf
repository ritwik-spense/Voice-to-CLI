limit_req_zone $binary_remote_addr zone=stt_limit:10m rate=50r/m;

server {
    listen 80;
    server_name stt.yourcompany.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name stt.yourcompany.com;

    ssl_certificate /etc/letsencrypt/live/stt.yourcompany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stt.yourcompany.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25M;

    location /v1/audio/transcriptions {
        limit_req zone=stt_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
